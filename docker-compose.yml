# 로컬 AI 인프라
# Phase 2b — pgvector (RAG 벡터 저장소)
# Phase 3d-2 — SearXNG (로컬 웹 검색, API 키 불필요)
# 기동: docker compose up -d
services:
  searxng:
    image: searxng/searxng:latest
    container_name: kyuloud-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: kyuloud-postgres
    environment:
      POSTGRES_DB: kyuloud
      POSTGRES_USER: kyuloud
      POSTGRES_PASSWORD: kyuloud
    ports:
      - "5432:5432"
    volumes:
      - kyuloud-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyuloud -d kyuloud"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kyuloud-pgdata:
