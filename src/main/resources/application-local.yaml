spring:
  # Phase 2b — pgvector 영속화용 PostgreSQL (docker-compose.yml 참고)
  datasource:
    url: jdbc:postgresql://localhost:5432/kyuloud
    username: kyuloud
    password: kyuloud
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e4b
          temperature: 0.7
      # 임베딩 모델은 RAG(Phase 2)에서 사용
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        # 스키마(vector_store 테이블)·확장 자동 생성
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # nomic-embed-text 임베딩 차원
        dimensions: 768

# Phase 2b — RAG 검색 파라미터 (RagProperties 바인딩)
kyuloud:
  rag:
    top-k: 4
    similarity-threshold: 0.5
  search:
    searxng-url: http://localhost:8888
    max-results: 5

# Phase 3d-3 — IntelliJ MCP 서버 연동
# 정확한 URL은 IntelliJ > Settings > Tools > MCP Server > [Copy SSE Config] 에서 확인
# 포트는 동적 할당되므로 반드시 IDE에서 확인 후 아래에 기입할 것
# IntelliJ를 실행하지 않을 때는 enabled: false 로 비활성화
spring:
  ai:
    mcp:
      client:
        enabled: true
        sse:
          connections:
            intellij:
              url: http://127.0.0.1:63342
              sse-endpoint: /mcp/sse

logging:
  level:
    com.kyuloud.ai: DEBUG
    org.springframework.ai: INFO
