spring:
  # Phase 2b — pgvector 영속화용 PostgreSQL (docker-compose.yml 참고)
  datasource:
    url: jdbc:postgresql://localhost:5432/kyuloud
    username: kyuloud
    password: kyuloud
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e4b
          temperature: 0.7
      # 임베딩 모델은 RAG(Phase 2)에서 사용
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        # 스키마(vector_store 테이블)·확장 자동 생성
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        # nomic-embed-text 임베딩 차원
        dimensions: 768
    # Phase 4d — 대화 메모리 JDBC 영속화. PostgreSQL 은 비임베디드라 스키마(SPRING_AI_CHAT_MEMORY)를
    # always 로 자동 생성(스크립트에 IF NOT EXISTS 포함이라 재기동 안전).
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    # Phase 3d-3 — IntelliJ MCP 서버 연동
    # ⚠️ 기본값 enabled:false (opt-in). true 로 켜기 전 반드시 아래를 맞출 것:
    #   1) IntelliJ > Settings > Tools > MCP Server > Enable MCP Server
    #   2) [Copy SSE Config] 로 정확한 url + sse-endpoint(경로) 확인 후 아래에 기입
    #      (initialized=true 기본값이라, 잘못된 url 로 enabled:true 면 기동이 실패함)
    #   3) IntelliJ MCP 미사용 시 enabled:false 로 둘 것
    mcp:
      client:
        enabled: false
        request-timeout: 20s
        sse:
          connections:
            intellij:
              url: http://127.0.0.1:64342
              sse-endpoint: /sse

# Phase 2b — RAG 검색 파라미터 (RagProperties 바인딩)
kyuloud:
  rag:
    top-k: 4
    similarity-threshold: 0.5
  search:
    searxng-url: http://localhost:8888
    max-results: 5
  # Phase 5 — 평가 기반 에이전트 루프(행동→평가 반복 상한)
  agent:
    loop:
      max-iterations: 3
    # Phase 6 — 통합 에이전트 요청 단위 예산/정지조건(무한루프·비용 폭주 방지, 초과 시 best-effort 합성)
    budget:
      max-llm-calls: 8
      timeout-millis: 60000

logging:
  level:
    com.kyuloud.ai: DEBUG
    org.springframework.ai: INFO
