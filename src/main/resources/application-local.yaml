spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e4b
          temperature: 0.7
      # 임베딩 모델은 RAG(Phase 2)에서 사용
      embedding:
        options:
          model: nomic-embed-text

logging:
  level:
    com.kyuloud.ai: DEBUG
    org.springframework.ai: INFO
