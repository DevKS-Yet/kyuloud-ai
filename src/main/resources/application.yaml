spring:
  application:
    name: kyuloud-ai
  profiles:
    active: local
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Phase 4c — 가드레일(입력 금칙어 차단 + PII 마스킹)
kyuloud:
  guardrail:
    enabled: true
    mask-pii: true
    banned-words:
      - 금칙어테스트
